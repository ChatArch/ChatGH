name: Publish Package

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Resolve package version
        id: meta
        run: |
          python - <<'PY'
          import ast
          import os
          from pathlib import Path

          module = ast.parse(Path("src/chatgh/__init__.py").read_text(encoding="utf-8"))
          for stmt in module.body:
              if not isinstance(stmt, ast.Assign):
                  continue
              if any(isinstance(target, ast.Name) and target.id == "__version__" for target in stmt.targets):
                  version = ast.literal_eval(stmt.value)
                  break
          else:
              raise SystemExit("__version__ not found in src/chatgh/__init__.py")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"version={version}", file=output)
              print(f"tag=v{version}", file=output)
          PY
      - name: Check release tag
        id: tag
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Check PyPI version
        id: pypi
        env:
          PACKAGE_NAME: "chatgh"
          PACKAGE_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          package = os.environ["PACKAGE_NAME"]
          version = os.environ["PACKAGE_VERSION"]
          url = f"https://pypi.org/pypi/{urllib.parse.quote(package)}/{urllib.parse.quote(version)}/json"
          exists = "false"
          try:
              urllib.request.urlopen(url, timeout=10)
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
          else:
              exists = "true"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"exists={exists}", file=output)
          PY
      - name: Create release tag
        if: steps.pypi.outputs.exists == 'false' && steps.tag.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag -a "${RELEASE_TAG}" -m "Release ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"
      - name: Stop when version is already on PyPI
        if: steps.pypi.outputs.exists == 'true'
        run: echo "chatgh ${{ steps.meta.outputs.version }} is already on PyPI; skipping publish."
      - name: Build distribution
        if: steps.pypi.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI
        if: steps.pypi.outputs.exists == 'false'
        uses: pypa/gh-action-pypi-publish@release/v1
